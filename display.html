<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #wordcloud {
            width: 100%;
            height: 100%;
            display: block;
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            color: #2e7d32;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="canvas-container">
            <canvas id="wordcloud"></canvas>
            <div id="placeholder" class="placeholder-text">انتظروا المشاركات الأولى... 🌿</div>
        </div>

        <div class="qr-hint">
            <img src="image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let wordList = [];
        const canvas = document.getElementById('wordcloud');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');
        let isDrawing = false;

        // Set canvas size - FIXED SIZE to prevent resizing issues
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            console.log('📐 Canvas resized:', canvas.width, 'x', canvas.height);
        }
        
        // Initialize canvas once
        window.addEventListener('load', () => {
            setTimeout(() => {
                resizeCanvas();
                // Draw initial placeholder
                ctx.fillStyle = '#2e7d32';
                ctx.font = 'bold 24px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText('انتظروا المشاركات الأولى... 🌿', canvas.width/2, canvas.height/2);
            }, 200);
        });

        // Green color palette
        const greenColors = [
            '#1b5e20', '#2e7d32', '#388e3c', '#43a047', 
            '#4caf50', '#66bb6a', '#81c784', '#a5d6a7'
        ];

        function drawWordCloud() {
            if (isDrawing) {
                console.log('⏳ Already drawing, skipping...');
                return;
            }
            
            isDrawing = true;
            console.log('🎨 Drawing word cloud with', wordList.length, 'words');
            
            if (wordList.length === 0) {
                placeholder.style.display = 'flex';
                isDrawing = false;
                return;
            }
            
            placeholder.style.display = 'none';
            
            // Format list for wordcloud2.js
            const list = wordList.map(w => [w.text, w.count]);
            console.log('📝 Words to draw:', list);
            
            // Clear canvas first
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw word cloud with SIMPLIFIED settings
            WordCloud(canvas, {
                list: list,
                // Font size - REDUCED to fit better
                minSize: 24,
                maxSize: 70,
                gridSize: 8,
                weightFactor: function(size) {
                    return Math.pow(size, 1.1) * 2.5;
                },
                // Font
                fontFamily: 'Segoe UI, Tahoma, sans-serif',
                fontWeight: 'bold',
                // Color
                color: function(word, weight) {
                    const index = Math.floor(Math.random() * greenColors.length);
                    return greenColors[index];
                },
                // Layout
                rotateRatio: 0.1,  // Less rotation for better Arabic display
                rotationSteps: 2,
                backgroundColor: '#ffffff',
                drawOutOfBound: false,
                shrinkToFit: true,
                abortThreshold: 8000,
                ellipticity: 0.9,
                clearCanvas: true,
                // Animation
                drawOutOfBound: false
            }, function(instance) {
                console.log('✅ WordCloud callback - rendering complete');
                isDrawing = false;
                
                // Verify something was drawn
                if (instance.grid.length === 0) {
                    console.warn('⚠️ No words were placed on the grid');
                    // Try drawing simple text as fallback
                    ctx.fillStyle = '#2e7d32';
                    ctx.font = 'bold 28px Segoe UI';
                    ctx.textAlign = 'center';
                    wordList.slice(0, 3).forEach((w, i) => {
                        ctx.fillText(w.text + ' (' + w.count + ')', canvas.width/2, canvas.height/2 + (i * 40));
                    });
                }
            });
        }

        // Listen for real-time updates
        database.ref('submissions').on('value', (snapshot) => {
            console.log('📥 Data snapshot received');
            
            const data = snapshot.val();
            const wordCount = {};
            let totalSubmissions = 0;

            if (data) {
                console.log('📊 Processing', Object.keys(data).length, 'submissions');
                
                Object.values(data).forEach((submission) => {
                    if (!submission || !submission.text) return;
                    
                    const words = submission.text.toLowerCase().split(/\s+/);
                    words.forEach(word => {
                        const cleanWord = word.replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, '');
                        if (cleanWord.length > 2) {
                            wordCount[cleanWord] = (wordCount[cleanWord] || 0) + 1;
                        }
                    });
                    totalSubmissions++;
                });
            }

            wordList = Object.entries(wordCount).map(([text, count]) => ({
                text,
                count
            }));

            document.getElementById('count').textContent = totalSubmissions;
            
            if (wordList.length > 0) {
                drawWordCloud();
            } else {
                placeholder.style.display = 'flex';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            
        }, (error) => {
            console.error('❌ Firebase error:', error);
            placeholder.textContent = 'خطأ في الاتصال: ' + error.message;
        });
    </script>
</body>
</html>
