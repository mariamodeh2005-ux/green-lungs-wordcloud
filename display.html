<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #wordcloud-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            overflow: hidden;
        }

        .word {
            position: absolute;
            font-weight: bold;
            color: white;
            cursor: default;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            animation: floatIn 0.5s ease-out;
            transition: all 0.3s ease;
            z-index: 10;
            white-space: nowrap;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .word:hover {
            transform: scale(1.3);
            z-index: 1000;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        @keyframes floatIn {
            0% { 
                opacity: 0; 
                transform: scale(0.5) rotate(0deg); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1) rotate(var(--rotation)); 
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 100;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
            z-index: 100;
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2e7d32;
            font-size: 28px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .lung-outline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 600px;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }

        .lung-outline path {
            fill: #2e7d32;
        }

        #debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-size: 11px;
            border-radius: 5px;
            max-width: 280px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="wordcloud-container">
            <!-- Lung outline background -->
            <svg class="lung-outline" viewBox="0 0 500 600">
                <!-- Left Lung -->
                <path d="M250 80 
                         C180 80 120 150 120 280 
                         C120 380 150 480 200 500 
                         C220 510 235 480 245 450 
                         L245 300 
                         L245 80 Z"/>
                <!-- Right Lung -->
                <path d="M250 80 
                         C320 80 380 150 380 280 
                         C380 380 350 480 300 500 
                         C280 510 265 480 255 450 
                         L255 300 
                         L255 80 Z"/>
            </svg>

            <div id="placeholder" class="placeholder-text">
                انتظروا المشاركات الأولى... 🌿<br>
                <span style="font-size: 18px; color: #558b2f;">امسحوا الكود وشاركونا رسائلكم!</span>
            </div>
        </div>

        <div class="qr-hint">
            <img src="image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <div id="debug-info">جاري التحميل...</div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('wordcloud-container');
        const placeholder = document.getElementById('placeholder');
        const countElement = document.getElementById('count');
        const debugInfo = document.getElementById('debug-info');

        // Green color palette - various shades
        const wordColors = [
            '#1b5e20', '#2e7d32', '#388e3c', '#43a047', 
            '#4caf50', '#66bb6a', '#81c784', '#2e5a1c',
            '#3d7426', '#4a8f3a', '#5cb85c', '#689f38'
        ];

        function updateDebug(msg) {
            debugInfo.textContent = msg;
            console.log('🔧', msg);
        }

        // Check if point is inside lung shape
        function isInsideLung(x, y, centerX, centerY) {
            const lungWidth = 250;
            const lungHeight = 420;
            
            const dx = Math.abs(x - centerX);
            const dy = y - (centerY - 100);
            
            // Elliptical lung boundary check
            const leftLungCenter = centerX - 100;
            const rightLungCenter = centerX + 100;
            
            // Left lung
            const leftDx = Math.abs(x - leftLungCenter);
            const leftIn = (Math.pow(leftDx / 120, 2) + Math.pow(dy / 200, 2)) <= 1;
            
            // Right lung
            const rightDx = Math.abs(x - rightLungCenter);
            const rightIn = (Math.pow(rightDx / 120, 2) + Math.pow(dy / 200, 2)) <= 1;
            
            return leftIn || rightIn;
        }

        // Check collision between two words
        function checkCollision(word1, word2) {
            const padding = 8;
            return !(
                word1.x + word1.width + padding < word2.x ||
                word1.x - padding > word2.x + word2.width ||
                word1.y + word1.height + padding < word2.y ||
                word1.y - padding > word2.y + word2.height
            );
        }

        function displayWordCloud(wordCounts) {
            updateDebug(`عرض ${wordCounts.length} كلمة`);
            
            // Remove old words
            const oldWords = container.querySelectorAll('.word');
            oldWords.forEach(w => w.remove());

            if (wordCounts.length === 0) {
                placeholder.style.display = 'block';
                updateDebug('لا توجد كلمات');
                return;
            }

            placeholder.style.display = 'none';
            updateDebug(`توزيع ${wordCounts.length} كلمة في شكل الرئتين`);

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            // Sort words by frequency (most frequent = largest)
            wordCounts.sort((a, b) => b.count - a.count);
            
            // Limit to top 80 words for clarity
            const displayWords = wordCounts.slice(0, 80);

            // Calculate max count for sizing
            const maxCount = displayWords[0]?.count || 1;

            // Placement grid with collision detection
            const placedWords = [];
            const angles = [0, 0, 0, 90, -90, 45, -45]; // Multiple angles for variety

            displayWords.forEach((wordObj, index) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'word';
                wordEl.textContent = wordObj.text;
                
                // Font size based on frequency (24px - 65px)
                const minSize = 24;
                const maxSize = 65;
                const size = Math.round(minSize + ((wordObj.count / maxCount) * (maxSize - minSize)));
                wordEl.style.fontSize = size + 'px';
                
                // Color
                wordEl.style.color = wordColors[index % wordColors.length];
                
                // Rotation angle (multiple directions)
                const angle = angles[index % angles.length];
                wordEl.style.setProperty('--rotation', angle + 'deg');
                
                // Try to find a position without collision
                let placed = false;
                let attempts = 0;
                const maxAttempts = 100;
                
                while (!placed && attempts < maxAttempts) {
                    // Spiral positioning from center
                    const spiralAngle = (index * 45 + attempts * 7) * (Math.PI / 180);
                    const radius = 50 + (attempts * 8) + (Math.random() * 30);
                    
                    const x = centerX + (Math.cos(spiralAngle) * radius) - (wordObj.text.length * size / 4);
                    const y = centerY - 100 + (Math.sin(spiralAngle) * radius * 1.3) - (size / 2);
                    
                    // Check if inside lung shape
                    if (isInsideLung(x, y, centerX, centerY)) {
                        const wordRect = {
                            x: x,
                            y: y,
                            width: wordObj.text.length * size * 0.6,
                            height: size * 1.2
                        };
                        
                        // Check collision with already placed words
                        let collision = false;
                        for (const placedWord of placedWords) {
                            if (checkCollision(wordRect, placedWord)) {
                                collision = true;
                                break;
                            }
                        }
                        
                        if (!collision) {
                            wordEl.style.left = x + 'px';
                            wordEl.style.top = y + 'px';
                            wordEl.style.zIndex = (index + 1).toString();
                            wordEl.style.animationDelay = (index * 0.03) + 's';
                            wordEl.title = `${wordObj.text}: ${wordObj.count} مرات`;
                            
                            container.appendChild(wordEl);
                            placedWords.push(wordRect);
                            placed = true;
                        }
                    }
                    
                    attempts++;
                }
                
                if (!placed) {
                    // Fallback: place anyway at random position
                    const fallbackAngle = Math.random() * Math.PI * 2;
                    const fallbackRadius = 100 + Math.random() * 200;
                    wordEl.style.left = (centerX + Math.cos(fallbackAngle) * fallbackRadius) + 'px';
                    wordEl.style.top = (centerY - 100 + Math.sin(fallbackAngle) * fallbackRadius * 1.3) + 'px';
                    container.appendChild(wordEl);
                }
            });

            updateDebug(`✅ تم عرض ${placedWords.length} كلمة بنجاح`);
        }

        // Process submissions into word cloud
        function processSubmissions(data) {
            const wordCount = {};
            let totalSubmissions = 0;

            if (data) {
                Object.values(data).forEach(submission => {
                    if (submission && submission.text) {
                        // Break into words
                        const words = submission.text.toLowerCase().split(/\s+/);
                        words.forEach(word => {
                            // Clean: keep Arabic, English, numbers
                            const cleanWord = word.replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, '');
                            if (cleanWord.length > 2) {
                                wordCount[cleanWord] = (wordCount[cleanWord] || 0) + 1;
                            }
                        });
                        totalSubmissions++;
                    }
                });
            }

            return {
                wordList: Object.entries(wordCount).map(([text, count]) => ({ text, count })),
                totalSubmissions
            };
        }

        // Listen for Firebase
        updateDebug('جاري الاتصال...');
        
        database.ref('submissions').on('value', (snapshot) => {
            updateDebug('📥 تم استلام البيانات');
            
            const data = snapshot.val();
            const result = processSubmissions(data);
            
            countElement.textContent = result.totalSubmissions;
            updateDebug(`إجمالي الكلمات: ${result.wordList.length}`);
            
            displayWordCloud(result.wordList);
            
        }, (error) => {
            console.error('❌ Error:', error);
            placeholder.textContent = 'خطأ: ' + error.message;
        });

        updateDebug('✅ جاهز');

        // Handle resize
        window.addEventListener('resize', () => {
            updateDebug('📐 تغيير الحجم - إعادة تحميل');
            database.ref('submissions').once('value');
        });
    </script>
</body>
</html>
