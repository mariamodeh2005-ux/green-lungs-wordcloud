<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #wordcloud-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            overflow: hidden;
        }

        .word {
            position: absolute;
            font-weight: bold;
            cursor: default;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .word:hover {
            transform: scale(1.2);
            z-index: 1000;
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2e7d32;
            font-size: 28px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .word-enter {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="wordcloud-container">
            <div id="placeholder" class="placeholder-text">انتظروا المشاركات الأولى... 🌿</div>
            <!-- Words will be added here as HTML elements -->
        </div>

        <div class="qr-hint">
            <img src="image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('wordcloud-container');
        const placeholder = document.getElementById('placeholder');
        const countElement = document.getElementById('count');

        // Green color palette
        const greenColors = [
            '#1b5e20', '#2e7d32', '#388e3c', '#43a047', 
            '#4caf50', '#66bb6a', '#81c784', '#a5d6a7'
        ];

        // Simple word cloud layout algorithm
        function createWordCloud(words) {
            // Clear existing words (except placeholder)
            const existingWords = container.querySelectorAll('.word');
            existingWords.forEach(word => word.remove());

            if (words.length === 0) {
                placeholder.style.display = 'block';
                return;
            }

            placeholder.style.display = 'none';

            // Sort words by count (most frequent first)
            words.sort((a, b) => b.count - a.count);

            // Container dimensions
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            // Create word elements
            words.forEach((wordObj, index) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'word word-enter';
                wordEl.textContent = wordObj.text;
                
                // Calculate font size based on frequency (32px - 70px)
                const minSize = 32;
                const maxSize = 70;
                const maxCount = words[0].count;
                const size = minSize + ((wordObj.count / maxCount) * (maxSize - minSize));
                
                wordEl.style.fontSize = size + 'px';
                wordEl.style.color = greenColors[Math.floor(Math.random() * greenColors.length)];
                
                // Position in a spiral pattern from center
                const angle = (index * 137.5) * (Math.PI / 180); // Golden angle
                const radius = 50 + (index * 35);
                
                const x = centerX + (Math.cos(angle) * radius) - (wordObj.text.length * size / 4);
                const y = centerY + (Math.sin(angle) * radius) - (size / 2);
                
                wordEl.style.left = Math.max(10, Math.min(x, containerWidth - (wordObj.text.length * size) - 10)) + 'px';
                wordEl.style.top = Math.max(10, Math.min(y, containerHeight - size - 10)) + 'px';
                
                // Add title tooltip
                wordEl.title = `${wordObj.text}: ${wordObj.count} مرة`;
                
                container.appendChild(wordEl);
            });

            console.log('✅ Word cloud created with', words.length, 'words');
        }

        // Listen for real-time updates
        database.ref('submissions').on('value', (snapshot) => {
            console.log('📥 Data snapshot received');
            
            const data = snapshot.val();
            const wordCount = {};
            let totalSubmissions = 0;

            if (data) {
                console.log('📊 Processing', Object.keys(data).length, 'submissions');
                
                Object.values(data).forEach((submission) => {
                    if (!submission || !submission.text) return;
                    
                    const words = submission.text.toLowerCase().split(/\s+/);
                    words.forEach(word => {
                        const cleanWord = word.replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, '');
                        if (cleanWord.length > 2) {
                            wordCount[cleanWord] = (wordCount[cleanWord] || 0) + 1;
                        }
                    });
                    totalSubmissions++;
                });
            }

            const wordList = Object.entries(wordCount).map(([text, count]) => ({
                text,
                count
            }));

            countElement.textContent = totalSubmissions;
            
            console.log('📝 Word list:', wordList);
            createWordCloud(wordList);
            
        }, (error) => {
            console.error('❌ Firebase error:', error);
            placeholder.textContent = 'خطأ في الاتصال: ' + error.message;
        });

        // Handle window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                console.log('📐 Window resized, refreshing word cloud...');
                // Trigger a refresh by re-reading from Firebase
                database.ref('submissions').once('value');
            }, 300);
        });
    </script>
</body>
</html>
