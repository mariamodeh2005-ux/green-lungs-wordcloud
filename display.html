<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #wordcloud-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            overflow: hidden;
        }

        /* Lung shape container */
        .lung-shape {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 600px;
            pointer-events: none;
            z-index: 1;
        }

        .message {
            position: absolute;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 15px;
            color: white;
            cursor: default;
            box-shadow: 0 2px 10px rgba(46, 125, 50, 0.3);
            animation: floatIn 0.5s ease-out;
            max-width: 180px;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 10;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .message:hover {
            transform: scale(1.15);
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(46, 125, 50, 0.5);
        }

        @keyframes floatIn {
            0% { 
                opacity: 0; 
                transform: scale(0.5); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 100;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
            z-index: 100;
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2e7d32;
            font-size: 28px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        /* Lung outline for visual guide */
        .lung-outline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 600px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .lung-outline path {
            fill: #2e7d32;
        }

        #debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-size: 11px;
            border-radius: 5px;
            max-width: 280px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="wordcloud-container">
            <!-- Lung outline background -->
            <svg class="lung-outline" viewBox="0 0 500 600">
                <!-- Left Lung -->
                <path d="M250 80 
                         C180 80 120 150 120 280 
                         C120 380 150 480 200 500 
                         C220 510 235 480 245 450 
                         L245 300 
                         L245 80 Z"/>
                <!-- Right Lung -->
                <path d="M250 80 
                         C320 80 380 150 380 280 
                         C380 380 350 480 300 500 
                         C280 510 265 480 255 450 
                         L255 300 
                         L255 80 Z"/>
            </svg>

            <div id="placeholder" class="placeholder-text">
                انتظروا المشاركات الأولى... 🌿<br>
                <span style="font-size: 18px; color: #558b2f;">امسحوا الكود وشاركونا رسائلكم!</span>
            </div>
            
            <!-- Messages will be positioned inside lung shape -->
        </div>

        <div class="qr-hint">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <div id="debug-info">جاري التحميل...</div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('wordcloud-container');
        const placeholder = document.getElementById('placeholder');
        const countElement = document.getElementById('count');
        const debugInfo = document.getElementById('debug-info');

        // Green color palette for message bubbles
        const messageColors = [
            '#1b5e20', '#2e7d32', '#388e3c', '#43a047', 
            '#4caf50', '#66bb6a', '#2e5a1c', '#3d7426'
        ];

        function updateDebug(msg) {
            debugInfo.textContent = msg;
            console.log('🔧', msg);
        }

        // Check if point is inside lung shape
        function isInsideLung(x, y, containerWidth, containerHeight) {
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;
            const lungWidth = 500;
            const lungHeight = 600;
            
            // Normalize coordinates
            const nx = (x - centerX) / (lungWidth / 2);
            const ny = (y - centerY) / (lungHeight / 2);
            
            // Simplified lung boundary check
            const topY = -0.8;
            const bottomY = 0.8;
            const maxWidth = Math.max(0.3, 1 - Math.abs(ny) * 0.5);
            
            return Math.abs(nx) <= maxWidth && ny >= topY && ny <= bottomY;
        }

        function displayMessages(messages) {
            updateDebug(`عرض ${messages.length} رسالة`);
            
            // Remove old messages
            const oldMessages = container.querySelectorAll('.message');
            oldMessages.forEach(m => m.remove());

            if (messages.length === 0) {
                placeholder.style.display = 'block';
                updateDebug('لا توجد رسائل - عرض الرسالة الافتراضية');
                return;
            }

            placeholder.style.display = 'none';
            updateDebug(`عرض ${messages.length} رسالة داخل شكل الرئتين`);

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            // Show all messages (up to 50 for performance)
            const displayMessages = messages.slice(-50).reverse();
            
            // Pre-defined positions within lung shape (left and right lung)
            const positions = [];
            
            // Left lung positions
            for (let i = 0; i < 25; i++) {
                const angle = 150 + (i * 8);
                const radius = 80 + (i % 5) * 35;
                positions.push({
                    x: centerX - 60 + Math.cos(angle * Math.PI / 180) * radius,
                    y: centerY - 100 + Math.sin(angle * Math.PI / 180) * radius,
                    lung: 'left'
                });
            }
            
            // Right lung positions
            for (let i = 0; i < 25; i++) {
                const angle = 30 + (i * 8);
                const radius = 80 + (i % 5) * 35;
                positions.push({
                    x: centerX + 60 + Math.cos(angle * Math.PI / 180) * radius,
                    y: centerY - 100 + Math.sin(angle * Math.PI / 180) * radius,
                    lung: 'right'
                });
            }

            displayMessages.forEach((msg, index) => {
                const messageEl = document.createElement('div');
                messageEl.className = 'message';
                messageEl.textContent = msg.text;
                
                // Font size based on position (varied for visual interest)
                const sizes = [14, 16, 18, 20, 22, 24];
                const size = sizes[index % sizes.length];
                messageEl.style.fontSize = size + 'px';
                
                // Color variation
                messageEl.style.background = messageColors[index % messageColors.length];
                
                // Get position from pre-defined lung positions
                const pos = positions[index % positions.length];
                messageEl.style.left = pos.x + 'px';
                messageEl.style.top = pos.y + 'px';
                
                // Z-index so messages don't overlap too much
                messageEl.style.zIndex = (index + 1).toString();
                
                // Add animation delay for staggered effect
                messageEl.style.animationDelay = (index * 0.05) + 's';
                
                // Add timestamp tooltip
                if (msg.timestamp) {
                    const date = new Date(msg.timestamp);
                    messageEl.title = `${msg.text}\n${date.toLocaleTimeString('ar-JO')}`;
                }
                
                container.appendChild(messageEl);
                
                updateDebug(`✅ رسالة ${index + 1}: ${msg.text.substring(0, 15)}...`);
            });

            updateDebug(`✅ تم عرض ${displayMessages.length} رسالة بنجاح في شكل الرئتين`);
        }

        // Listen for Firebase data
        updateDebug('جاري الاتصال بقاعدة البيانات...');
        
        database.ref('submissions').on('value', (snapshot) => {
            updateDebug('📥 تم استلام البيانات');
            
            const data = snapshot.val();
            let totalSubmissions = 0;
            const messages = [];

            if (data) {
                const submissions = Object.values(data);
                updateDebug(`📊 معالجة ${submissions.length} مشاركة`);
                
                submissions.forEach((submission, idx) => {
                    if (!submission || !submission.text) {
                        updateDebug(`⚠️ المشاركة ${idx} لا تحتوي على نص`);
                        return;
                    }
                    
                    // Store complete message
                    messages.push({
                        text: submission.text.trim(),
                        timestamp: submission.timestamp
                    });
                    
                    totalSubmissions++;
                });
            }

            countElement.textContent = totalSubmissions;
            updateDebug(`إجمالي الرسائل: ${messages.length}`);
            
            displayMessages(messages);
            
        }, (error) => {
            console.error('❌ Firebase error:', error);
            updateDebug('❌ خطأ: ' + error.message);
            placeholder.textContent = 'خطأ في الاتصال: ' + error.message;
        });

        updateDebug('✅ اكتمل التحميل');
        
        // Handle window resize
        window.addEventListener('resize', () => {
            updateDebug('📐 تغيير حجم النافذة - إعادة تحميل الرسائل');
            database.ref('submissions').once('value');
        });
    </script>
</body>
</html>
