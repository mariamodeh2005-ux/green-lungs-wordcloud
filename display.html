<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #wordcloud-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            overflow: hidden;
        }

        .message {
            position: absolute;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            cursor: default;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            animation: floatIn 0.6s ease-out;
            max-width: 300px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .message:hover {
            transform: scale(1.1);
            z-index: 1000;
            box-shadow: 0 6px 25px rgba(46, 125, 50, 0.5);
        }

        @keyframes floatIn {
            0% { 
                opacity: 0; 
                transform: scale(0.5) translateY(20px); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2e7d32;
            font-size: 28px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .lung-shape {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        #debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            border-radius: 5px;
            max-width: 300px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="wordcloud-container">
            <!-- Lung background shape -->
            <svg class="lung-shape" width="400" height="500" viewBox="0 0 400 500">
                <path d="M200 50 C100 50 50 150 50 250 C50 350 100 400 150 380 C170 370 180 340 190 320 C195 340 205 340 210 320 C220 340 230 370 250 380 C300 400 350 350 350 250 C350 150 300 50 200 50 Z" 
                      fill="#2e7d32"/>
            </svg>
            
            <div id="placeholder" class="placeholder-text">انتظروا المشاركات الأولى... 🌿</div>
            <!-- Full messages will be added here -->
        </div>

        <div class="qr-hint">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <div id="debug-info">جاري التحميل...</div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('wordcloud-container');
        const placeholder = document.getElementById('placeholder');
        const countElement = document.getElementById('count');
        const debugInfo = document.getElementById('debug-info');

        // Green color variations for message bubbles
        const messageColors = [
            'linear-gradient(135deg, #4caf50 0%, #2e7d32 100%)',
            'linear-gradient(135deg, #66bb6a 0%, #388e3c 100%)',
            'linear-gradient(135deg, #81c784 0%, #43a047 100%)',
            'linear-gradient(135deg, #4caf50 0%, #1b5e20 100%)',
            'linear-gradient(135deg, #66bb6a 0%, #2e5a1c 100%)'
        ];

        function updateDebug(msg) {
            debugInfo.textContent = msg;
            console.log('🔧', msg);
        }

        function displayMessages(messages) {
            updateDebug(`عرض ${messages.length} رسالة`);
            
            // Remove old messages
            const oldMessages = container.querySelectorAll('.message');
            oldMessages.forEach(m => m.remove());

            if (messages.length === 0) {
                placeholder.style.display = 'block';
                updateDebug('لا توجد رسائل - عرض الرسالة الافتراضية');
                return;
            }

            placeholder.style.display = 'none';
            updateDebug(`عرض ${messages.length} رسالة كاملة`);

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;

            // Show last 20 messages (most recent first)
            const recentMessages = messages.slice(-20).reverse();
            
            // Position messages in a cloud pattern within lung shape
            recentMessages.forEach((msg, index) => {
                const messageEl = document.createElement('div');
                messageEl.className = 'message';
                messageEl.textContent = msg.text;
                
                // Font size based on position (newer = slightly larger)
                const baseSize = 20;
                const maxSize = 32;
                const size = baseSize + ((index / recentMessages.length) * (maxSize - baseSize));
                messageEl.style.fontSize = size + 'px';
                
                // Color variation
                messageEl.style.background = messageColors[index % messageColors.length];
                
                // Position in a spiral/cloud pattern
                const angle = (index * 75) * (Math.PI / 180);
                const radius = 80 + (index * 25);
                
                const centerX = containerWidth / 2;
                const centerY = containerHeight / 2;
                
                const x = centerX + (Math.cos(angle) * radius) - 100;
                const y = centerY + (Math.sin(angle) * radius) - 25;
                
                // Keep within bounds
                messageEl.style.left = Math.max(20, Math.min(x, containerWidth - 220)) + 'px';
                messageEl.style.top = Math.max(20, Math.min(y, containerHeight - 60)) + 'px';
                
                // Z-index so newer messages appear on top
                messageEl.style.zIndex = (index + 1).toString();
                
                // Add animation delay for staggered effect
                messageEl.style.animationDelay = (index * 0.1) + 's';
                
                // Add timestamp tooltip
                if (msg.timestamp) {
                    const date = new Date(msg.timestamp);
                    messageEl.title = `${msg.text}\n${date.toLocaleTimeString('ar-JO')}`;
                }
                
                container.appendChild(messageEl);
                
                updateDebug(`✅ رسالة ${index + 1}: ${msg.text.substring(0, 20)}...`);
            });

            updateDebug(`✅ تم عرض ${recentMessages.length} رسالة بنجاح`);
        }

        // Listen for Firebase data
        updateDebug('جاري الاتصال بقاعدة البيانات...');
        
        database.ref('submissions').on('value', (snapshot) => {
            updateDebug('📥 تم استلام البيانات');
            
            const data = snapshot.val();
            let totalSubmissions = 0;
            const messages = [];

            if (data) {
                const submissions = Object.values(data);
                updateDebug(`📊 معالجة ${submissions.length} مشاركة`);
                
                submissions.forEach((submission, idx) => {
                    if (!submission || !submission.text) {
                        updateDebug(`⚠️ المشاركة ${idx} لا تحتوي على نص`);
                        return;
                    }
                    
                    // Store complete message (NOT breaking into words)
                    messages.push({
                        text: submission.text.trim(),
                        timestamp: submission.timestamp
                    });
                    
                    totalSubmissions++;
                });
            }

            countElement.textContent = totalSubmissions;
            updateDebug(`إجمالي الرسائل: ${messages.length}`);
            
            displayMessages(messages);
            
        }, (error) => {
            console.error('❌ Firebase error:', error);
            updateDebug('❌ خطأ: ' + error.message);
            placeholder.textContent = 'خطأ في الاتصال: ' + error.message;
        });

        updateDebug('✅ اكتمل التحميل');
        
        // Handle window resize
        window.addEventListener('resize', () => {
            updateDebug('📐 تغيير حجم النافذة - إعادة تحميل الرسائل');
            database.ref('submissions').once('value');
        });
    </script>
</body>
</html>
