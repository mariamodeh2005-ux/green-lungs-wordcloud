<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <!-- Fixed: Removed trailing spaces in CDN URLs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wordcloud {
            width: 100%;
            height: 100%;
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            color: #2e7d32;
            font-size: 24px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="canvas-container">
            <canvas id="wordcloud"></canvas>
            <div id="placeholder" class="placeholder-text">انتظروا المشاركات الأولى... 🌿</div>
        </div>

        <div class="qr-hint">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <script>
        // Firebase Configuration - Fixed: Removed trailing spaces in databaseURL
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let wordList = [];
        const canvas = document.getElementById('wordcloud');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholder');

        // Set canvas size
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            console.log('📐 Canvas resized:', canvas.width, 'x', canvas.height);
        }
        
        // Initialize canvas after DOM loads
        window.addEventListener('load', () => {
            setTimeout(resizeCanvas, 100);
        });
        window.addEventListener('resize', resizeCanvas);

        // Check if wordcloud2.js loaded
        if (typeof WordCloud === 'undefined') {
            console.error('❌ wordcloud2.js not loaded');
            placeholder.textContent = 'خطأ في تحميل المكتبة، يرجى تحديث الصفحة';
        }

        // Green color palette
        const greenColors = [
            '#1b5e20', '#2e7d32', '#388e3c', '#43a047', 
            '#4caf50', '#66bb6a', '#81c784', '#a5d6a7',
            '#2e5a1c', '#3d7426', '#4a8f3a', '#5cb85c'
        ];

        function drawWordCloud() {
            console.log('🎨 Drawing word cloud with', wordList.length, 'words');
            
            if (wordList.length === 0) {
                placeholder.style.display = 'flex';
                return;
            }
            
            placeholder.style.display = 'none';
            
            // Format list for wordcloud2.js: [word, weight]
            const list = wordList.map(w => [w.text, w.count]);
            
            WordCloud(canvas, {
                list: list,
                // Font size settings - Updated for 32px minimum
                minSize: 32,
                maxSize: 85,
                gridSize: 12,
                weightFactor: function(size) {
                    return Math.pow(size, 1.15) * 3.5;
                },
                // Font settings for Arabic support
                fontFamily: 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif',
                fontWeight: '600',
                fontSize: 32,
                // Color settings
                color: function(word, weight) {
                    return greenColors[Math.floor(Math.random() * greenColors.length)];
                },
                // Layout settings
                rotateRatio: 0.2,
                rotationSteps: 2,
                backgroundColor: '#f1f8e9',
                drawOutOfBound: false,
                shrinkToFit: true,
                abortThreshold: 6000,
                ellipticity: 0.85,
                shape: 'circle',
                clearCanvas: true,
                // RTL support for Arabic
                textDirection: 'rtl',
                // Animation
                drawOutOfBound: false,
                shrinkToFit: true
            });
            
            console.log('✅ WordCloud rendered');
        }

        // Listen for real-time updates with error handling
        database.ref('submissions').on('value', (snapshot) => {
            console.log('📥 Data snapshot received');
            
            const data = snapshot.val();
            const wordCount = {};
            let totalSubmissions = 0;

            if (data) {
                console.log('📊 Processing', Object.keys(data).length, 'submissions');
                
                Object.values(data).forEach((submission) => {
                    if (!submission || !submission.text) return;
                    
                    const words = submission.text.toLowerCase().split(/\s+/);
                    words.forEach(word => {
                        // Clean word: keep Arabic letters, English letters, numbers
                        const cleanWord = word.replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, '');
                        if (cleanWord.length > 2) {
                            wordCount[cleanWord] = (wordCount[cleanWord] || 0) + 1;
                        }
                    });
                    totalSubmissions++;
                });
            }

            wordList = Object.entries(wordCount).map(([text, count]) => ({
                text,
                count
            }));

            // Update counter
            document.getElementById('count').textContent = totalSubmissions;
            
            // Draw or clear
            if (wordList.length > 0) {
                drawWordCloud();
            } else {
                placeholder.style.display = 'flex';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            
        }, (error) => {
            console.error('❌ Firebase error:', error);
            placeholder.textContent = 'خطأ في الاتصال: ' + error.message;
        });
    </script>
</body>
</html>
