<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #wordcloud-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            overflow: visible;
        }

        .message {
            position: absolute;
            font-weight: bold;
            color: white;
            cursor: default;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: floatIn 0.6s ease-out;
            transition: all 0.3s ease;
            z-index: 10;
            padding: 6px 14px;
            border-radius: 20px;
            opacity: 0.9;
            max-width: 200px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: rtl;
        }

        .message:hover {
            transform: scale(1.2);
            z-index: 1000;
            opacity: 1;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            white-space: normal;
            max-width: 250px;
        }

        @keyframes floatIn {
            0% { 
                opacity: 0; 
                transform: scale(0.3) rotate(0deg); 
            }
            100% { 
                opacity: 0.9; 
                transform: scale(1) rotate(var(--rotation)); 
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 100;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
            z-index: 100;
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2e7d32;
            font-size: 28px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .lung-outline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 600px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .lung-outline path {
            fill: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="wordcloud-container">
            <svg class="lung-outline" viewBox="0 0 500 600">
                <path d="M250 80 C180 80 120 150 120 280 C120 380 150 480 200 500 C220 510 235 480 245 450 L245 300 L245 80 Z"/>
                <path d="M250 80 C320 80 380 150 380 280 C380 380 350 480 300 500 C280 510 265 480 255 450 L255 300 L255 80 Z"/>
            </svg>
            <div id="placeholder" class="placeholder-text">
                انتظروا المشاركات الأولى... 🌿<br>
                <span style="font-size: 18px; color: #558b2f;">امسحوا الكود وشاركونا رسائلكم!</span>
            </div>
        </div>

        <div class="qr-hint">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('wordcloud-container');
        const placeholder = document.getElementById('placeholder');
        const countElement = document.getElementById('count');

        // Green color palette
        const messageColors = [
            '#1b5e20', '#2e7d32', '#388e3c', '#43a047', 
            '#4caf50', '#66bb6a', '#81c784', '#2e5a1c',
            '#3d7426', '#4a8f3a', '#5cb85c', '#689f38'
        ];

        function displayMessageCloud(messages) {
            // Remove old messages
            const oldMessages = container.querySelectorAll('.message');
            oldMessages.forEach(m => m.remove());

            if (messages.length === 0) {
                placeholder.style.display = 'block';
                return;
            }

            placeholder.style.display = 'none';

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            // Sort by frequency (most repeated messages = larger)
            messages.sort((a, b) => b.count - a.count);
            
            // Limit to top 40 unique messages for clarity
            const displayMessages = messages.slice(0, 40);
            const maxCount = displayMessages[0]?.count || 1;

            // Different rotation angles for variety
            const angles = [0, 0, 0, 90, -90, 45, -45, 0];
            const placedMessages = [];

            displayMessages.forEach((msgObj, index) => {
                const msgEl = document.createElement('div');
                msgEl.className = 'message';
                msgEl.textContent = msgObj.text;
                
                // Font size based on frequency (18px - 42px)
                const minSize = 18;
                const maxSize = 42;
                const size = Math.round(minSize + ((msgObj.count / maxCount) * (maxSize - minSize)));
                msgEl.style.fontSize = size + 'px';
                
                // Color
                msgEl.style.background = messageColors[index % messageColors.length];
                
                // Rotation angle
                const rotation = angles[index % angles.length];
                msgEl.style.setProperty('--rotation', rotation + 'deg');
                
                // Truncate long messages with ellipsis, show full on hover
                if (msgObj.text.length > 25) {
                    msgEl.title = msgObj.text;
                }
                
                // Find position with collision detection
                let placed = false;
                let attempts = 0;
                const maxAttempts = 80;
                
                while (!placed && attempts < maxAttempts) {
                    // Spiral pattern from center within lung shape
                    const angle = (index * 43 + attempts * 19) * (Math.PI / 180);
                    const radius = 70 + (attempts * 14);
                    
                    const x = centerX + Math.cos(angle) * radius - (msgObj.text.length * size / 5);
                    const y = centerY - 90 + Math.sin(angle) * radius * 1.25 - (size / 2);
                    
                    const msgRect = {
                        x: x,
                        y: y,
                        width: Math.min(msgObj.text.length * size * 0.5, 200),
                        height: size * 1.4
                    };
                    
                    // Check bounds (within lung area)
                    if (x > 80 && x < containerWidth - 180 && y > 70 && y < containerHeight - 70) {
                        // Check collision with already placed messages
                        let collision = false;
                        for (const placedMsg of placedMessages) {
                            const padding = 12;
                            if (!(msgRect.x + msgRect.width + padding < placedMsg.x ||
                                  msgRect.x - padding > placedMsg.x + placedMsg.width ||
                                  msgRect.y + msgRect.height + padding < placedMsg.y ||
                                  msgRect.y - padding > placedMsg.y + placedMsg.height)) {
                                collision = true;
                                break;
                            }
                        }
                        
                        if (!collision) {
                            msgEl.style.left = x + 'px';
                            msgEl.style.top = y + 'px';
                            msgEl.style.zIndex = (index + 1).toString();
                            msgEl.style.animationDelay = (index * 0.06) + 's';
                            
                            container.appendChild(msgEl);
                            placedMessages.push(msgRect);
                            placed = true;
                        }
                    }
                    
                    attempts++;
                }
                
                // Fallback: place in grid if can't find spot
                if (!placed) {
                    const fallbackX = 120 + (index % 4) * 180;
                    const fallbackY = 100 + Math.floor(index / 4) * 90;
                    msgEl.style.left = fallbackX + 'px';
                    msgEl.style.top = fallbackY + 'px';
                    container.appendChild(msgEl);
                }
            });
        }

        // Process submissions - keep full messages, don't split into words
        function processSubmissions(data) {
            const messageCount = {};
            let totalSubmissions = 0;

            if (data) {
                Object.values(data).forEach(submission => {
                    if (submission && submission.text) {
                        // Keep the FULL message as-is (trimmed)
                        const fullMessage = submission.text.trim();
                        
                        if (fullMessage.length > 0) {
                            // Count identical messages for sizing
                            messageCount[fullMessage] = (messageCount[fullMessage] || 0) + 1;
                        }
                        totalSubmissions++;
                    }
                });
            }

            // Convert to array for display
            return {
                messageList: Object.entries(messageCount).map(([text, count]) => ({ text, count })),
                totalSubmissions
            };
        }

        // Listen for Firebase updates
        database.ref('submissions').on('value', (snapshot) => {
            const data = snapshot.val();
            const result = processSubmissions(data);
            
            countElement.textContent = result.totalSubmissions;
            displayMessageCloud(result.messageList);
            
        }, (error) => {
            console.error('Error:', error);
            placeholder.textContent = 'خطأ في الاتصال';
        });
    </script>
</body>
</html>
