<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار الاتصال المجتمعي - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f1f8e9 0%, #c8e6c9 100%);
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #558b2f;
            font-size: 1.3em;
            margin-bottom: 20px;
            text-align: center;
        }

        #wordcloud-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 70vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.2);
            overflow: visible;
        }

        .word {
            position: absolute;
            font-weight: bold;
            cursor: default;
            padding: 5px 10px;
            border-radius: 5px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        .qr-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .qr-hint img {
            width: 100px;
            height: 100px;
        }

        .qr-hint p {
            color: #2e7d32;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2e7d32;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .live-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #2e7d32;
            font-size: 28px;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        #debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            border-radius: 5px;
            max-width: 300px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🫁 جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر والحياة الصحية</div>
        
        <div class="stats">
            عدد المشاركات: <span id="count">0</span>
        </div>

        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>مباشر</span>
        </div>

        <div id="wordcloud-container">
            <div id="placeholder" class="placeholder-text">انتظروا المشاركات الأولى... 🌿</div>
        </div>

        <div class="qr-hint">
            <img src="image/png;base64,iVBORw0KGgoAAAANSUhEUgAAASwAAAEsCAYAAAB5fY51AAAACXBIWXMAAA7EAAAOxAGVKw4bAAADZ0lEQVR4nO3dQW7bMBBA0eH9D+0uugiQRZBFkEWR ..." alt="QR Code">
            <p>امسحوا الكود وشاركونا كلماتكم!</p>
        </div>
    </div>

    <div id="debug-info">Initializing...</div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
            authDomain: "greenlungswordcloud.firebaseapp.com",
            databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
            projectId: "greenlungswordcloud",
            storageBucket: "greenlungswordcloud.firebasestorage.app",
            messagingSenderId: "472160955042",
            appId: "1:472160955042:web:45076a55b147a4738a45fb"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const container = document.getElementById('wordcloud-container');
        const placeholder = document.getElementById('placeholder');
        const countElement = document.getElementById('count');
        const debugInfo = document.getElementById('debug-info');

        // Green color palette - DARKER for visibility
        const greenColors = [
            '#1b5e20', '#2e7d32', '#1b5e20', '#2e7d32', 
            '#388e3c', '#43a047', '#2e7d32', '#1b5e20'
        ];

        function updateDebug(msg) {
            debugInfo.textContent = msg;
            console.log('🔧', msg);
        }

        function createWordCloud(words) {
            updateDebug(`Creating cloud with ${words.length} words`);
            
            // Remove old words
            const oldWords = container.querySelectorAll('.word');
            oldWords.forEach(w => w.remove());

            if (words.length === 0) {
                placeholder.style.display = 'block';
                updateDebug('No words - showing placeholder');
                return;
            }

            placeholder.style.display = 'none';
            updateDebug(`Processing ${words.length} words`);

            // Sort by count
            words.sort((a, b) => b.count - a.count);

            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const centerX = containerWidth / 2;
            const centerY = containerHeight / 2;

            // Create words in a grid pattern for guaranteed visibility
            let placedCount = 0;
            const maxWords = Math.min(words.length, 30); // Show max 30 words
            
            for (let i = 0; i < maxWords; i++) {
                const wordObj = words[i];
                
                const wordEl = document.createElement('div');
                wordEl.className = 'word';
                wordEl.textContent = wordObj.text;
                
                // Font size: 32-60px based on frequency
                const minSize = 32;
                const maxSize = 60;
                const maxCount = words[0].count;
                const size = Math.round(minSize + ((wordObj.count / maxCount) * (maxSize - minSize)));
                
                wordEl.style.fontSize = size + 'px';
                wordEl.style.color = greenColors[i % greenColors.length];
                wordEl.style.zIndex = (100 - i).toString();
                
                // SIMPLE GRID POSITIONING - guaranteed to be visible
                const cols = 5;
                const col = i % cols;
                const row = Math.floor(i / cols);
                const cellWidth = containerWidth / cols;
                const cellHeight = containerHeight / 6;
                
                const x = (col * cellWidth) + (cellWidth / 2) - (wordObj.text.length * size / 4);
                const y = (row * cellHeight) + (cellHeight / 2) - (size / 2);
                
                wordEl.style.left = Math.max(20, x) + 'px';
                wordEl.style.top = Math.max(20, y) + 'px';
                
                // Add hover effect
                wordEl.title = `${wordObj.text} (${wordObj.count} مرات)`;
                wordEl.style.cursor = 'pointer';
                wordEl.onclick = function() {
                    this.style.transform = 'scale(1.3)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 300);
                };
                
                container.appendChild(wordEl);
                placedCount++;
                
                updateDebug(`Placed word ${i+1}/${maxWords}: ${wordObj.text} at ${Math.max(20,x)},${Math.max(20,y)}`);
            }

            updateDebug(`✅ Successfully placed ${placedCount} words`);
        }

        // Listen for Firebase data
        updateDebug('Connecting to Firebase...');
        
        database.ref('submissions').on('value', (snapshot) => {
            updateDebug('📥 Data received');
            
            const data = snapshot.val();
            const wordCount = {};
            let totalSubmissions = 0;

            if (data) {
                const submissions = Object.values(data);
                updateDebug(`Processing ${submissions.length} submissions`);
                
                submissions.forEach((submission, idx) => {
                    if (!submission || !submission.text) {
                        updateDebug(`⚠️ Submission ${idx} has no text`);
                        return;
                    }
                    
                    const words = submission.text.toLowerCase().split(/\s+/);
                    words.forEach(word => {
                        const cleanWord = word.replace(/[^\u0600-\u06FFa-zA-Z0-9]/g, '');
                        if (cleanWord.length > 2) {
                            wordCount[cleanWord] = (wordCount[cleanWord] || 0) + 1;
                        }
                    });
                    totalSubmissions++;
                });
            }

            const wordList = Object.entries(wordCount).map(([text, count]) => ({
                text,
                count
            }));

            countElement.textContent = totalSubmissions;
            updateDebug(`Total words: ${wordList.length}, Total submissions: ${totalSubmissions}`);
            
            createWordCloud(wordList);
            
        }, (error) => {
            console.error('❌ Firebase error:', error);
            updateDebug('❌ Error: ' + error.message);
            placeholder.textContent = 'خطأ: ' + error.message;
        });

        updateDebug('✅ Initialization complete');
    </script>
</body>
</html>
