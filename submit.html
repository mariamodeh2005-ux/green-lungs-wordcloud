<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شارك رسالتك - Green Lungs</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 4em;
            margin-bottom: 10px;
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #558b2f;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 3px solid #c8e6c9;
            border-radius: 10px;
            font-size: 1.1em;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #4caf50;
        }

        button {
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 125, 50, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            background: #c8e6c9;
            color: #2e7d32;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .examples {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e8f5e9;
        }

        .examples h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .example-list {
            color: #558b2f;
            font-size: 0.95em;
            line-height: 1.8;
        }

        .heart {
            color: #e91e63;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🫁</div>
        <h1>جدار الاتصال المجتمعي</h1>
        <div class="subtitle">شاركونا كلماتكم عن التنفس الحر!</div>

        <form id="submissionForm">
            <div class="form-group">
                <label for="message">اكتبوا رسالتكم أو كلمتكم:</label>
                <textarea 
                    id="message" 
                    placeholder="مثال: أختار التنفس الحر... حياتي بدون تدخين... رئتيّ تستحقان الأفضل..."
                    maxlength="100"
                    required
                ></textarea>
                <div style="text-align: left; color: #888; font-size: 0.85em; margin-top: 5px;">
                    <span id="charCount">0</span>/100 حرف
                </div>
            </div>

            <button type="submit">إرسال الرسالة 🌿</button>
        </form>

        <div class="success-message" id="successMessage">
            ✅ شكراً لمشاركتكم! رسالتكم ظهرت على الجدار الرقمي
        </div>

        <div class="examples">
            <h3>💡 أفكار لرسائلكم:</h3>
            <div class="example-list">
                • "أختار الصحة والحياة"<br>
                • "رئتيّ تستحقان الهواء النقي"<br>
                • "حريتي تبدأ بإقلاعي"<br>
                • "أتنفس حرية، أحيا حياة"<br>
                • "كل يوم بدون تدخين هو انتصار"
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration - REPLACE WITH YOUR OWN
  const firebaseConfig = {
    apiKey: "AIzaSyBzx_qOvMD88VDUiDwA0a4pPiXw_pMiCk4",
    authDomain: "greenlungswordcloud.firebaseapp.com",
    databaseURL: "https://greenlungswordcloud-default-rtdb.firebaseio.com",
    projectId: "greenlungswordcloud",
    storageBucket: "greenlungswordcloud.firebasestorage.app",
    messagingSenderId: "472160955042",
    appId: "1:472160955042:web:45076a55b147a4738a45fb",
    measurementId: "G-51TZ1276X0"
  };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const form = document.getElementById('submissionForm');
        const messageInput = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        const successMessage = document.getElementById('successMessage');

        messageInput.addEventListener('input', () => {
            charCount.textContent = messageInput.value.length;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message) return;

            try {
                // Save to Firebase
                await database.ref('submissions').push({
                    text: message,                    // Must be "text" field
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    lang: document.documentElement.lang || 'ar'
                });
                
                // Show success message
                successMessage.style.display = 'block';
                form.style.display = 'none';

                // Hide success after 3 seconds and reset
                setTimeout(() => {
                    successMessage.style.display = 'none';
                    form.style.display = 'block';
                    messageInput.value = '';
                    charCount.textContent = '0';
                }, 3000);

            } catch (error) {
                console.error('Error submitting:', error);
                alert('حدث خطأ، يرجى المحاولة مرة أخرى');
            }
        });
    </script>
</body>
</html>
